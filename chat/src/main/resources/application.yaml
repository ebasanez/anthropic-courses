spring:
  application:
    name: spring-ai-claude-demo
  autoconfigure:
    # The pgvector starter is inherited from the parent pom and puts a JDBC driver +
    # vector-store autoconfig on the classpath. This module never owns a vector store
    # (embedding-server does), so both stay off in every profile.
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  servlet:
    multipart:
      max-file-size: 100MB               # per single file
      max-request-size: 200MB            # total request (all files combined)
  docker:
    compose:
      enabled: false                     # containers belong to embedding-server
  ai:
    model:
      chat: anthropic                    # Claude stays the chat model
      embedding: none                    # embeddings are the embedding-server's job
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        model: claude-sonnet-4-6

anthropic:
  cache:
    # Prompt-cache strategy: NONE | TOOLS_ONLY | SYSTEM_ONLY | SYSTEM_AND_TOOLS | CONVERSATION_HISTORY
    strategy: SYSTEM_AND_TOOLS

server:
  tomcat:
    # don't reset the connection when rejecting an oversize upload -> client gets a clean error
    max-swallow-size: -1

logging:
  level:
    model.wire: DEBUG
tools:
    text-editor:
        enabled: false

embedding:
  server:
    # Where the embedding-server module listens. Used under the rag profile for both
    # retrieval (QuestionAnswerAdvisor) and document upload/list/delete proxying.
    # Chunking options (rag.splitter, rag.semantic.*) are configured over there.
    base-url: http://localhost:8081
