<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDE TERMINAL</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --green: #33ff66;
            --green-dim: #1f9e44;
            --bg: #0a0e0a;
        }
        body {
            font-family: "Courier New", Courier, monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--green);
            text-shadow: 0 0 2px var(--green), 0 0 6px color-mix(in srgb, var(--green) 40%, transparent);
        }
        /* CRT scanline + flicker overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 1px,
                rgba(0,0,0,0.25) 2px,
                rgba(0,0,0,0.25) 3px
            );
            z-index: 9999;
        }
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--green-dim);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin: 0;
        }
        h1::before { content: "[ "; }
        h1::after { content: " ]"; }
        #chat {
            background: #000;
            border: 1px solid var(--green-dim);
            box-shadow: 0 0 12px color-mix(in srgb, var(--green) 25%, transparent), inset 0 0 20px color-mix(in srgb, var(--green) 5%, transparent);
            padding: 12px;
            height: 60vh;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .traffic-lights {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 14px;
            height: 14px;
            padding: 0;
            border: 1px solid rgba(0,0,0,0.5);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 4px currentColor;
        }
        .dot-green, .traffic-lights .dot-green:hover { background: #33ff66; color: #33ff66; }
        .dot-orange, .traffic-lights .dot-orange:hover { background: #ff9933; color: #ff9933; }
        .dot-red, .traffic-lights .dot-red:hover { background: #ff4d4d; color: #ff4d4d; }
        .dot.active {
            box-shadow: 0 0 0 2px #fff, 0 0 6px currentColor;
        }
        .msg {
            margin: 6px 0;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .user::before { content: "> "; color: var(--green); }
        .assistant { color: var(--green); opacity: 0.9; }
        .assistant::before { content: "claude$ "; color: var(--green-dim); }
        .error { color: #ff4d4d; text-shadow: 0 0 4px #ff4d4d; }
        .error::before { content: "ERROR: "; }
        form { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .main-row::before {
            content: ">";
            color: var(--green);
            font-size: 1.1rem;
        }
        .options-row { padding-left: 18px; }
        input[type=text], input[type=number], select {
            padding: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: #000;
            border: 1px solid var(--green-dim);
            color: var(--green);
            caret-color: var(--green);
        }
        input[type=text] { flex: 1; }
        input[type=number], select { width: 110px; }
        input[type=text]:focus, input[type=number]:focus, select:focus {
            outline: none;
            box-shadow: 0 0 8px color-mix(in srgb, var(--green) 50%, transparent);
        }
        input[type=text]::placeholder, input[type=number]::placeholder { color: var(--green-dim); }
        button {
            padding: 10px 16px;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid var(--green-dim);
            background: #000;
            color: var(--green);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover:not(:disabled) {
            background: var(--green);
            color: #000;
        }
        button:disabled { opacity: 0.4; cursor: default; }
        #send { background: var(--green); color: #000; }
        .check-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            white-space: nowrap;
            color: var(--green);
        }
        .check-label input[type=checkbox] {
            accent-color: var(--green);
        }

        /* blinking cursor on the input row */
        .cursor {
            display: inline-block;
            width: 9px;
            height: 1.1em;
            background: var(--green);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--green-dim); }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>CLAUDE TERMINAL v1.0 // LOCAL</h1>
        <div class="traffic-lights">
            <button type="button" class="dot dot-green active" data-theme="green" aria-label="Green theme"></button>
            <button type="button" class="dot dot-orange" data-theme="orange" aria-label="Orange theme"></button>
            <button type="button" class="dot dot-red" data-theme="red" aria-label="Red theme"></button>
        </div>
    </div>
    <div id="chat"></div>
    <form id="form">
        <div class="row main-row">
            <input type="text" id="message" placeholder="type a command..." autocomplete="off" required>
            <button type="button" id="reset">Reset</button>
            <button type="submit" id="send">Send</button>
            <input type="hidden" id="tone" name="tone" value="KIND">
            <span class="cursor"></span>
        </div>
        <div class="row options-row">
            <select id="maxTokens">
                <option value="">Unlimited</option>
                <option value="50">Brief</option>
                <option value="100">Lite</option>
                <option value="300">Verbose</option>
            </select>
            <select id="temperature">
                <option value="">Default</option>
                <option value="0.0">0.0</option>
                <option value="0.1">0.1</option>
                <option value="0.2">0.2</option>
                <option value="0.3">0.3</option>
                <option value="0.4">0.4</option>
                <option value="0.5">0.5</option>
                <option value="0.6">0.6</option>
                <option value="0.7">0.7</option>
                <option value="0.8">0.8</option>
                <option value="0.9">0.9</option>
                <option value="1.0">1.0</option>
            </select>
            <label class="check-label"><input type="checkbox" id="streamMode"> Stream mode</label>
        </div>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('form');
        const input = document.getElementById('message');
        const maxTokensInput = document.getElementById('maxTokens');
        const temperatureInput = document.getElementById('temperature');
        const sendBtn = document.getElementById('send');
        const resetBtn = document.getElementById('reset');
        const streamModeInput = document.getElementById('streamMode');

        let conversationId = sessionStorage.getItem('conversationId');
        if (!conversationId) {
            conversationId = crypto.randomUUID();
            sessionStorage.setItem('conversationId', conversationId);
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        addMessage('System ready. Awaiting input...', 'assistant');

        async function streamInto(url, target) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            target.textContent = '';
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop();
                for (const event of events) {
                    const text = event.split('\n')
                        .filter(line => line.startsWith('data:'))
                        .map(line => line.slice(5).replace(/^ /, ''))
                        .join('\n');
                    if (text) target.textContent += text;
                    chat.scrollTop = chat.scrollHeight;
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            const pending = addMessage('...', 'assistant');

            try {
                const streaming = streamModeInput.checked;
                let url = '/api/ai/' + (streaming ? 'stream' : 'chat') + '?message=' + encodeURIComponent(message)
                    + '&conversationId=' + encodeURIComponent(conversationId)
                    + '&tone=' + encodeURIComponent(toneInput.value);
                const maxTokens = maxTokensInput.value.trim();
                if (maxTokens) url += '&maxTokens=' + encodeURIComponent(maxTokens);
                const temperature = temperatureInput.value.trim();
                if (temperature) url += '&temperature=' + encodeURIComponent(temperature);

                if (streaming) {
                    await streamInto(url, pending);
                } else {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    pending.textContent = await res.text();
                }
            } catch (err) {
                pending.classList.add('error');
                pending.textContent = err.message;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        });

        const toneInput = document.getElementById('tone');
        const THEMES = {
            green: { main: '#33ff66', dim: '#1f9e44', tone: 'KIND' },
            orange: { main: '#ff9933', dim: '#b35900', tone: 'NEUTRAL' },
            red: { main: '#ff4d4d', dim: '#a32626', tone: 'RUDE' }
        };
        document.querySelectorAll('.traffic-lights .dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const theme = THEMES[dot.dataset.theme];
                document.documentElement.style.setProperty('--green', theme.main);
                document.documentElement.style.setProperty('--green-dim', theme.dim);
                document.querySelectorAll('.traffic-lights .dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                toneInput.value = theme.tone;
            });
        });

        resetBtn.addEventListener('click', () => {
            conversationId = crypto.randomUUID();
            sessionStorage.setItem('conversationId', conversationId);
            chat.innerHTML = '';
            addMessage('System ready. Awaiting input...', 'assistant');
            maxTokensInput.value = '';
            temperatureInput.value = '';
            streamModeInput.checked = false;
            document.querySelector('.traffic-lights .dot-green').click();
            input.focus();
        });
    </script>
</body>
</html>
