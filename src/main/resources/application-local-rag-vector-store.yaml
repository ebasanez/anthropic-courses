# Docker-based vector store: activate with SPRING_PROFILES_ACTIVE=local-vector-store

spring:
  autoconfigure:
    exclude: []                          # re-enable DataSource autoconfig under rag
  docker:
    compose:
      enabled: true                      # Boot auto-starts the Ollama + pgvector containers
  http:
    clients:
      read-timeout: 5m                   # Ollama embedding of many sentences (semantic) can be slow
      connect-timeout: 30s
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: postgres
    password: postgres
  ai:
    model:
      embedding: ollama                  # Ollama serves ONLY embeddings
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
      init:
        pull-model-strategy: when_missing   # the first run pulls the embed model
    vectorstore:
      pgvector:
        initialize-schema: true          # CREATE ... IF NOT EXISTS — idempotent, keeps rows
        dimensions: 768                  # must match nomic-embed-text
        index-type: hnsw
        distance-type: cosine_distance
