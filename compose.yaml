services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama   # persist the pulled embed model across runs

  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data   # persist document vectors across runs

volumes:
  ollama-data:
  pgvector-data:
